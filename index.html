<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesion | Sistema de Gestion ID</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>
<body data-page="login">

    <div class="login-container">
        <!-- Panel izquierdo: branding -->
        <div class="login-branding">
            <div class="branding-content">
                <img src="assets/logo.svg" alt="Sistema de Gestion" class="branding-logo" />
                <h1 class="branding-title">Sistema de Gestion</h1>
                <p class="branding-subtitle">Plataforma integral de gestion empresarial</p>
                <div class="branding-features">
                    <div class="feature-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <span>Gestion de Planos</span>
                    </div>
                    <div class="feature-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <span>Control de Aprobaciones</span>
                    </div>
                    <div class="feature-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <span>Administracion de Usuarios</span>
                    </div>
                </div>
            </div>
            <div class="branding-decoration">
                <div class="decoration-circle circle-1"></div>
                <div class="decoration-circle circle-2"></div>
                <div class="decoration-circle circle-3"></div>
            </div>
        </div>

        <!-- Panel derecho: formulario -->
        <div class="login-form-panel">
            <div class="login-card">
                <div class="login-header">
                    <img src="assets/logo.svg" alt="Sistema de Gestion" class="login-logo-mobile" />
                    <h2>Bienvenido</h2>
                    <p>Ingrese sus credenciales para continuar</p>
                </div>

                <form id="loginForm" class="login-form" novalidate>
                    <div class="alert alert-danger" id="loginError" role="alert" style="display:none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <span></span>
                    </div>

                    <div class="form-group">
                        <label for="usuario" class="form-label">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Usuario
                        </label>
                        <input type="text" id="usuario" name="usuario" class="login-input" placeholder="Ingrese su usuario" autocomplete="username" />
                    </div>

                    <div class="form-group">
                        <label for="contrasena" class="form-label">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Contrasena
                        </label>
                        <input type="password" id="contrasena" name="contrasena" class="login-input" placeholder="Ingrese su contrasena" autocomplete="current-password" />
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="spinner" id="loginSpinner" style="display:none;"></span>
                        <span id="loginBtnText">Iniciar Sesion</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                    </button>
                </form>

                <div class="login-footer">
                    <p>&copy; 2026 Sistema de Gestion. Todos los derechos reservados.</p>
                    <p class="login-demo-hint">Demo: ingrese usuario y contrasena.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
