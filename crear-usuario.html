<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Usuario | Sistema de Gestion ID</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <style>
        .crear-usuario .card { border: none; border-radius: 0.5rem; }
        .crear-usuario .card-header { border-radius: 0.5rem 0.5rem 0 0; }
        .crear-usuario .form-label { color: #333; margin-bottom: 0.5rem; }
        .crear-usuario .btn-lg { padding: 0.75rem 1.5rem; font-weight: 500; }
        .crear-usuario .form-control,
        .crear-usuario .form-control-lg { font-size: 1rem; }
    </style>
</head>
<body data-page="crear-usuario">
    <div class="app-pagina">
        <div class="app-barra-lateral" id="sidebar"></div>
        <main class="app-principal">
            <div id="topbar"></div>
            <article class="app-contenido">
                <div class="container-fluid py-4 crear-usuario">

                    <!-- Titulo -->
                    <div class="page-header">
                        <div class="ph-left">
                            <div class="ph-icon"><i class="bi bi-person-plus-fill"></i></div>
                            <div>
                                <h1>Crear Nuevo Usuario</h1>
                                <p class="ph-sub">Registra un nuevo usuario en el sistema</p>
                            </div>
                        </div>
                        <a href="usuarios.html" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
                    </div>

                    <!-- Mensajes -->
                    <div class="row">
                        <div class="col-lg-8 offset-lg-2">
                            <div class="alert alert-success" id="crearExito" style="display:none;">
                                <i class="bi bi-check-circle"></i> <span></span>
                            </div>
                            <div class="alert alert-danger" id="crearError" style="display:none;">
                                <i class="bi bi-exclamation-triangle"></i> <span></span>
                            </div>
                        </div>
                    </div>

                    <!-- Formulario -->
                    <div class="row">
                        <div class="col-lg-8 offset-lg-2">
                            <form id="formCrearUsuario" novalidate>
                                <div class="card shadow-sm">
                                    <div class="card-header bg-primary text-white">
                                        <h5 class="mb-0">Datos del Nuevo Usuario</h5>
                                    </div>
                                    <div class="card-body p-4">
                                        <div class="mb-4">
                                            <label for="usuario" class="form-label fw-bold"><i class="bi bi-person"></i> Nombre de Usuario</label>
                                            <input id="usuario" name="usuario" class="form-control form-control-lg" placeholder="Ingrese nombre de usuario (3-50 caracteres)" />
                                        </div>
                                        <div class="mb-4">
                                            <label for="nomape" class="form-label fw-bold"><i class="bi bi-person-badge"></i> Nombre y Apellido</label>
                                            <input id="nomape" name="nomape" class="form-control form-control-lg" placeholder="Ej: Juan Perez Garcia" />
                                        </div>
                                        <div class="mb-4">
                                            <label for="area" class="form-label fw-bold"><i class="bi bi-building"></i> Area de Trabajo</label>
                                            <input id="area" name="area" class="form-control form-control-lg" placeholder="Ej: ADMIN" />
                                        </div>
                                        <div class="mb-4">
                                            <label for="cc" class="form-label fw-bold"><i class="bi bi-credit-card"></i> Centro Costos (CC)</label>
                                            <input type="number" id="cc" name="cc" class="form-control form-control-lg" placeholder="Ingrese numero de centro de costos" />
                                        </div>

                                        <hr />

                                        <div class="mb-4">
                                            <label for="contrasena" class="form-label fw-bold"><i class="bi bi-lock"></i> Contrasena</label>
                                            <div class="input-group input-group-lg">
                                                <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="Ingrese contrasena (minimo 6 caracteres)" />
                                                <button type="button" class="btn btn-outline-secondary" data-toggle-pass="contrasena" title="Mostrar/Ocultar"><i class="bi bi-eye"></i></button>
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label for="confirmar" class="form-label fw-bold"><i class="bi bi-lock"></i> Confirmar Contrasena</label>
                                            <div class="input-group input-group-lg">
                                                <input type="password" id="confirmar" name="confirmar" class="form-control" placeholder="Confirme la contrasena" />
                                                <button type="button" class="btn btn-outline-secondary" data-toggle-pass="confirmar" title="Mostrar/Ocultar"><i class="bi bi-eye"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card-footer bg-light p-4">
                                        <div class="d-flex gap-2 justify-content-end">
                                            <button type="button" class="btn btn-lg btn-outline-secondary" id="btnLimpiarUsuario">
                                                <i class="bi bi-arrow-counterclockwise"></i> Limpiar
                                            </button>
                                            <button type="submit" class="btn btn-lg btn-success">
                                                <i class="bi bi-check-lg"></i> Crear Usuario
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </article>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
