<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrar Usuarios | Sistema de Gestion ID</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
</head>
<body data-page="usuarios">
    <div class="app-pagina">
        <div class="app-barra-lateral" id="sidebar"></div>
        <main class="app-principal">
            <div id="topbar"></div>
            <article class="app-contenido">
                <div class="container-fluid py-4">

                    <!-- Encabezado -->
                    <div class="page-header">
                        <div class="ph-left">
                            <div class="ph-icon"><i class="bi bi-people-fill"></i></div>
                            <div>
                                <h1>Administrar Usuarios</h1>
                                <p class="ph-sub">Gestiona los usuarios registrados en el sistema</p>
                            </div>
                        </div>
                        <a href="crear-usuario.html" class="btn btn-primary">
                            <i class="bi bi-person-plus"></i> Crear Usuario
                        </a>
                    </div>

                    <!-- Tabla -->
                    <div class="row">
                        <div class="col-12">
                            <div class="table-responsive panel-card">
                                <table class="table table-hover align-middle mb-0">
                                    <thead>
                                        <tr>
                                            <th><i class="bi bi-hash"></i> ID</th>
                                            <th><i class="bi bi-person"></i> Usuario</th>
                                            <th><i class="bi bi-person-badge"></i> Nombre y Apellido</th>
                                            <th><i class="bi bi-building"></i> Area</th>
                                            <th><i class="bi bi-credit-card"></i> CC</th>
                                            <th class="text-center"><i class="bi bi-gear"></i> Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="usuariosBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Info -->
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="alert alert-light border border-secondary">
                                <small class="text-muted">
                                    <i class="bi bi-info-circle"></i>
                                    Total de usuarios: <strong id="usuariosTotal">0</strong>
                                </small>
                            </div>
                        </div>
                    </div>

                </div>
            </article>
        </main>
    </div>

    <!-- MODAL EDITAR USUARIO -->
    <div class="app-modal-overlay" id="modalEditarUsuario" style="display:none;">
        <div class="modal-dialog modal-lg" style="margin:0;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Editar Usuario</h5>
                    <button type="button" class="btn-close" onclick="cerrarEditarUsuario()"></button>
                </div>
                <form id="formEditarUsuario">
                    <div class="modal-body">
                        <input type="hidden" id="editCodID" />
                        <div class="mb-3">
                            <label for="editUsuario" class="form-label fw-bold"><i class="bi bi-person"></i> Nombre de Usuario</label>
                            <input id="editUsuario" class="form-control" placeholder="Nombre de usuario" required />
                        </div>
                        <div class="mb-3">
                            <label for="editNomApe" class="form-label fw-bold"><i class="bi bi-person-badge"></i> Nombre y Apellido</label>
                            <input id="editNomApe" class="form-control" placeholder="Nombre y Apellido" required />
                        </div>
                        <div class="mb-3">
                            <label for="editArea" class="form-label fw-bold"><i class="bi bi-building"></i> Area</label>
                            <input id="editArea" class="form-control" placeholder="Area" required />
                        </div>
                        <div class="mb-3">
                            <label for="editCC" class="form-label fw-bold"><i class="bi bi-credit-card"></i> Centro de Costos</label>
                            <input type="number" id="editCC" class="form-control" placeholder="Centro de Costos" required />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="cerrarEditarUsuario()">Cancelar</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
